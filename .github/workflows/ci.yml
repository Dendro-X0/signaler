name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate package version and release notes
        run: |
          set -euo pipefail
          PKG=$(node -p "require('./package.json').version")
          JSR=$(node -p "require('./jsr.json').version")
          if [ "$PKG" != "$JSR" ]; then
            echo "Version mismatch: package.json=$PKG jsr.json=$JSR" >&2
            exit 1
          fi
          NOTES="docs/archive/release-notes/RELEASE-NOTES-v${PKG}.md"
          if [ ! -f "$NOTES" ]; then
            echo "Missing release notes: $NOTES" >&2
            echo "Bump package.json + jsr.json and add notes before tagging v${PKG}." >&2
            exit 1
          fi
          echo "Release metadata OK for v${PKG}"

  test:
    needs: release-readiness
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Ensure pnpm
      run: |
        corepack prepare pnpm@10 --activate
        pnpm --version

    - name: Cache pnpm store
      uses: actions/cache@v4
      with:
        path: |
          ~/.pnpm-store
          ~/.local/share/pnpm/store
          ~/.local/share/pnpm/store/v3
        key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      
    - name: Build project
      run: pnpm build
      
    - name: Run smoke tests
      env:
        CI: true
      run: pnpm test:smoke

    - name: Run full test suite
      id: test_full
      env:
        CI: true
      run: |
        set -o pipefail
        pnpm test:full 2>&1 | tee "vitest-${{ matrix.node-version }}.log"

    - name: Upload vitest log
      if: failure() && steps.test_full.outcome == 'failure'
      uses: actions/upload-artifact@v4
      with:
        name: vitest-log-${{ matrix.node-version }}
        path: vitest-${{ matrix.node-version }}.log
        if-no-files-found: warn
        retention-days: 14

    - name: Generate test coverage
      if: matrix.node-version == '22.x'
      env:
        CI: true
      run: |
        set -o pipefail
        pnpm test:coverage 2>&1 | tee vitest-coverage-22.x.log

    - name: Upload coverage vitest log
      if: failure() && matrix.node-version == '22.x'
      uses: actions/upload-artifact@v4
      with:
        name: vitest-log-22.x-coverage
        path: vitest-coverage-22.x.log
        if-no-files-found: warn
        retention-days: 14
      
    - name: Upload coverage reports
      if: matrix.node-version == '22.x'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage/coverage-final.json
        flags: unittests
        name: codecov-umbrella
        
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Ensure pnpm
      run: |
        corepack prepare pnpm@10 --activate
        pnpm --version

    - name: Cache pnpm store
      uses: actions/cache@v4
      with:
        path: |
          ~/.pnpm-store
          ~/.local/share/pnpm/store
          ~/.local/share/pnpm/store/v3
        key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      
    - name: Build project
      run: pnpm build

    - name: Run property-based tests
      id: quality_property
      env:
        CI: true
      run: |
        set -o pipefail
        pnpm test:full -- --filter Property 2>&1 | tee vitest-quality-property.log

    - name: Upload quality vitest log (property)
      if: failure() && steps.quality_property.outcome == 'failure'
      uses: actions/upload-artifact@v4
      with:
        name: vitest-log-quality-property
        path: vitest-quality-property.log
        if-no-files-found: warn
        retention-days: 14

    - name: Validate TypeScript declarations
      id: quality_ts_decl
      env:
        CI: true
      run: |
        set -o pipefail
        pnpm test:full typescript-declaration-completeness.test.ts 2>&1 | tee vitest-quality-ts-decl.log

    - name: Upload quality vitest log (ts decl)
      if: failure() && steps.quality_ts_decl.outcome == 'failure'
      uses: actions/upload-artifact@v4
      with:
        name: vitest-log-quality-ts-decl
        path: vitest-quality-ts-decl.log
        if-no-files-found: warn
        retention-days: 14

    - name: Check package metadata
      id: quality_metadata
      env:
        CI: true
      run: |
        set -o pipefail
        pnpm test:full package-metadata-completeness.test.ts 2>&1 | tee vitest-quality-metadata.log

    - name: Upload quality vitest log (metadata)
      if: failure() && steps.quality_metadata.outcome == 'failure'
      uses: actions/upload-artifact@v4
      with:
        name: vitest-log-quality-metadata
        path: vitest-quality-metadata.log
        if-no-files-found: warn
        retention-days: 14

    - name: Validate API documentation
      id: quality_api_docs
      env:
        CI: true
      run: |
        set -o pipefail
        pnpm test:full api-documentation-coverage.test.ts 2>&1 | tee vitest-quality-api-docs.log

    - name: Upload quality vitest log (api docs)
      if: failure() && steps.quality_api_docs.outcome == 'failure'
      uses: actions/upload-artifact@v4
      with:
        name: vitest-log-quality-api-docs
        path: vitest-quality-api-docs.log
        if-no-files-found: warn
        retention-days: 14

  cross-platform-smoke:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Ensure pnpm
      run: |
        corepack prepare pnpm@10 --activate
        pnpm --version

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Build project
      run: pnpm build

    - name: Run smoke tests
      run: pnpm test:smoke

    - name: Run Phase 6 critical smoke tests
      run: pnpm run test:phase6:smoke

    - name: Emit cross-platform smoke evidence
      if: always()
      run: pnpm run bench:phase6:cross-platform-evidence -- --os "${{ matrix.os }}" --out-json "benchmarks/out/cross-platform-smoke-${{ matrix.os }}.json" --out-md "benchmarks/out/cross-platform-smoke-${{ matrix.os }}.md"

    - name: Upload cross-platform smoke evidence
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cross-platform-smoke-${{ matrix.os }}
        path: |
          benchmarks/out/cross-platform-smoke-${{ matrix.os }}.json
          benchmarks/out/cross-platform-smoke-${{ matrix.os }}.md
        if-no-files-found: warn

  phase6-release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [cross-platform-smoke]
    if: always() && !cancelled()

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Download cross-platform smoke evidence
      uses: actions/download-artifact@v4
      with:
        pattern: cross-platform-smoke-*
        path: benchmarks/out
        merge-multiple: true

    - name: Evaluate Phase 6 release gate
      run: pnpm run bench:phase6:gate

    - name: Validate Phase 6 release gate report
      run: pnpm run bench:phase6:validate

    - name: Upload Phase 6 release gate report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: phase6-release-gate
        path: |
          benchmarks/out/phase6-release-gate.json
          benchmarks/out/phase6-release-gate.md
        if-no-files-found: warn
      
  publish-dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test, quality, cross-platform-smoke, phase6-release-gate]
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Ensure pnpm
      run: |
        corepack prepare pnpm@10 --activate
        pnpm --version

    - name: Cache pnpm store
      uses: actions/cache@v4
      with:
        path: |
          ~/.pnpm-store
          ~/.local/share/pnpm/store
          ~/.local/share/pnpm/store/v3
        key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      
    - name: Build project
      run: pnpm build
      
    - name: Test package publication (dry run)
      run: pnpm pack

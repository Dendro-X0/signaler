name: Signaler
description: Run Signaler audit in CI with managed serve, artifacts, and job summary output.
branding:
  icon: activity
  color: blue

inputs:
  cli-version:
    description: JSR package version (e.g. 4.4.0). Bump before each release publish.
    required: false
    default: "4.4.0"
  base-url:
    description: Application base URL for audits
    required: false
    default: "http://127.0.0.1:3000"
  cwd:
    description: Project directory to audit
    required: false
    default: "."
  scope:
    description: Discover scope when using audit or ci preset (quick|full|file)
    required: false
    default: "full"
  preset:
    description: Workflow preset — audit (v4 orchestrator), ci, pr, or agent
    required: false
    default: "ci"
  run-profile:
    description: Optional policy profile (ci-strict, pr-quick, release-full). Overrides preset when set.
    required: false
    default: ""
  quality-profile:
    description: Optional bundled quality profile (web-quality). Overrides preset and run-profile when set.
    required: false
    default: ""
  managed-serve-mode:
    description: Managed serve mode (auto|dev|production)
    required: false
    default: "auto"
  output-dir:
    description: Signaler artifact directory
    required: false
    default: ".signaler"
  config-path:
    description: Optional signaler.config.json path (for run/pr when config exists)
    required: false
    default: ""
  upload-artifacts:
    description: Upload .signaler artifacts after the run
    required: false
    default: "true"
  write-summary:
    description: Append report --summary to the GitHub Actions job summary
    required: false
    default: "true"
  artifact-name:
    description: Name prefix for uploaded artifacts
    required: false
    default: "signaler"
  baseline-artifacts-path:
    description: Optional path to main-branch .signaler artifacts for PR regression compare
    required: false
    default: ""

outputs:
  output-dir:
    description: Resolved artifact output directory
    value: ${{ inputs.output-dir }}

runs:
  using: composite
  steps:
    - name: Run Signaler (quality profile)
      if: inputs.quality-profile != ''
      shell: bash
      working-directory: ${{ inputs.cwd }}
      env:
        SIGNALER_BASE_URL: ${{ inputs.base-url }}
      run: |
        set -euo pipefail
        ARGS=(
          job run
          --quality-profile "${{ inputs.quality-profile }}"
          --base-url "${SIGNALER_BASE_URL}"
          --managed-serve
          --managed-serve-mode "${{ inputs.managed-serve-mode }}"
          --in-process
          --dir "${{ inputs.output-dir }}"
          --scope "${{ inputs.scope }}"
        )
        if [ -n "${{ inputs.config-path }}" ]; then
          ARGS+=(--config "${{ inputs.config-path }}")
        fi
        npx jsr run "@signaler/cli@${{ inputs.cli-version }}" -- "${ARGS[@]}"

    - name: Run Signaler (run profile)
      if: inputs.run-profile != '' && inputs.quality-profile == ''
      shell: bash
      working-directory: ${{ inputs.cwd }}
      env:
        SIGNALER_BASE_URL: ${{ inputs.base-url }}
      run: |
        set -euo pipefail
        ARGS=(
          job run
          --run-profile "${{ inputs.run-profile }}"
          --base-url "${SIGNALER_BASE_URL}"
          --managed-serve
          --managed-serve-mode "${{ inputs.managed-serve-mode }}"
          --in-process
          --dir "${{ inputs.output-dir }}"
        )
        if [ "${{ inputs.run-profile }}" = "ci-strict" ] || [ "${{ inputs.run-profile }}" = "release-full" ]; then
          ARGS+=(--scope "${{ inputs.scope }}")
        fi
        if [ -n "${{ inputs.config-path }}" ]; then
          ARGS+=(--config "${{ inputs.config-path }}")
        fi
        npx jsr run "@signaler/cli@${{ inputs.cli-version }}" -- "${ARGS[@]}"

    - name: Run Signaler (audit preset)
      if: inputs.preset == 'audit' && inputs.run-profile == '' && inputs.quality-profile == ''
      shell: bash
      working-directory: ${{ inputs.cwd }}
      env:
        SIGNALER_BASE_URL: ${{ inputs.base-url }}
      run: |
        set -euo pipefail
        npx jsr run "@signaler/cli@${{ inputs.cli-version }}" -- audit \
          --cwd . \
          --base-url "${SIGNALER_BASE_URL}" \
          --scope "${{ inputs.scope }}" \
          --managed-serve \
          --managed-serve-mode "${{ inputs.managed-serve-mode }}" \
          --in-process \
          --summary \
          --dir "${{ inputs.output-dir }}"

    - name: Run Signaler (job preset)
      if: inputs.preset != 'audit' && inputs.run-profile == '' && inputs.quality-profile == ''
      shell: bash
      working-directory: ${{ inputs.cwd }}
      env:
        SIGNALER_BASE_URL: ${{ inputs.base-url }}
      run: |
        set -euo pipefail
        ARGS=(
          job run
          --preset "${{ inputs.preset }}"
          --base-url "${SIGNALER_BASE_URL}"
          --managed-serve
          --managed-serve-mode "${{ inputs.managed-serve-mode }}"
          --in-process
          --dir "${{ inputs.output-dir }}"
        )
        if [ "${{ inputs.preset }}" = "ci" ] || [ "${{ inputs.preset }}" = "agent" ]; then
          ARGS+=(--scope "${{ inputs.scope }}")
        fi
        if [ -n "${{ inputs.config-path }}" ]; then
          ARGS+=(--config "${{ inputs.config-path }}")
        fi
        npx jsr run "@signaler/cli@${{ inputs.cli-version }}" -- "${ARGS[@]}"

    - name: Baseline compare (PR regression)
      if: inputs.baseline-artifacts-path != ''
      shell: bash
      working-directory: ${{ inputs.cwd }}
      run: |
        set -euo pipefail
        npx jsr run "@signaler/cli@${{ inputs.cli-version }}" -- query \
          --view delta \
          --dir "${{ inputs.output-dir }}" \
          --baseline "${{ inputs.baseline-artifacts-path }}" \
          --fail-on-regression \
          --max-red-increase 0

    - name: Write job summary
      if: inputs.write-summary == 'true'
      shell: bash
      working-directory: ${{ inputs.cwd }}
      run: |
        set -euo pipefail
        SUMMARY_FILE="${RUNNER_TEMP}/signaler-summary.md"
        npx jsr run "@signaler/cli@${{ inputs.cli-version }}" -- report \
          --dir "${{ inputs.output-dir }}" \
          --summary > "${SUMMARY_FILE}" 2>/dev/null || true
        if [ -s "${SUMMARY_FILE}" ]; then
          {
            echo "## Signaler summary"
            echo ""
            cat "${SUMMARY_FILE}"
          } >> "${GITHUB_STEP_SUMMARY}"
        fi
        PERF_JSON="$(npx jsr run "@signaler/cli@${{ inputs.cli-version }}" -- query \
          --view perf \
          --dir "${{ inputs.output-dir }}" \
          --json 2>/dev/null || echo '{}')"
        if [ "${PERF_JSON}" != "{}" ]; then
          {
            echo ""
            echo "### Performance triage (JSON)"
            echo '```json'
            echo "${PERF_JSON}" | head -c 12000
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
        fi
        if [ -f "${{ inputs.output-dir }}/quality-pack.json" ]; then
          PACK_JSON="$(cat "${{ inputs.output-dir }}/quality-pack.json")"
          PACK_PASSED="$(echo "${PACK_JSON}" | node -e "const p=JSON.parse(require('fs').readFileSync(0,'utf8'));process.stdout.write(String(p.passed));")"
          if [ "${PACK_PASSED}" = "false" ]; then
            echo "::error title=Signaler quality pack::Quality pack gate failed — see quality-pack.json"
          fi
          {
            echo ""
            echo "### Quality pack"
            echo '```json'
            echo "${PACK_JSON}" | head -c 6000
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
        fi
        if [ -n "${{ inputs.baseline-artifacts-path }}" ]; then
          DELTA_JSON="$(npx jsr run "@signaler/cli@${{ inputs.cli-version }}" -- query \
            --view delta \
            --dir "${{ inputs.output-dir }}" \
            --baseline "${{ inputs.baseline-artifacts-path }}" \
            --json 2>/dev/null || echo '{}')"
          if [ "${DELTA_JSON}" != "{}" ]; then
            MATCHED="$(echo "${DELTA_JSON}" | node -e "const d=JSON.parse(require('fs').readFileSync(0,'utf8'));process.stdout.write(String(d.comparability?.matched ?? true));")"
            if [ "${MATCHED}" = "false" ]; then
              echo "::warning title=Signaler comparability::Baseline and PR runs are not comparable — see job summary delta JSON and docs/guides/when-deltas-lie.md"
            fi
            RED_DELTA="$(echo "${DELTA_JSON}" | node -e "const d=JSON.parse(require('fs').readFileSync(0,'utf8'));process.stdout.write(String(d.performance?.delta?.red ?? 0));")"
            if [ "${RED_DELTA}" -gt 0 ] 2>/dev/null; then
              echo "::error title=Signaler perf regression::Red performance issues increased by ${RED_DELTA} vs baseline (issue-count triage)."
            fi
            {
              echo ""
              echo "### Baseline delta"
              echo '```json'
              echo "${DELTA_JSON}" | head -c 8000
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
          fi
        fi

    - name: Upload Signaler artifacts
      if: inputs.upload-artifacts == 'true' && always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}-${{ github.run_id }}
        path: ${{ inputs.cwd }}/${{ inputs.output-dir }}/**
        if-no-files-found: warn

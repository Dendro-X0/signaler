name: Signaler Audit (npm)

on:
  pull_request:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Application base URL"
        required: false
        default: "http://127.0.0.1:3000"
      config_path:
        description: "Path to signaler config file (optional)"
        required: false
        default: ""
      routes_scope:
        description: "Route discovery scope: quick|full|file"
        required: false
        default: "full"
      job_preset:
        description: "Signaler preset: audit|ci|agent|pr"
        required: false
        default: "ci"
      cli_version:
        description: "JSR @signaler/cli version"
        required: false
        default: "4.2.0"

jobs:
  signaler:
    runs-on: ubuntu-latest
    env:
      SIGNALER_BASE_URL: ${{ inputs.base_url || 'http://127.0.0.1:3000' }}
      SIGNALER_CONFIG_PATH: ${{ inputs.config_path || '' }}
      SIGNALER_ROUTES_SCOPE: ${{ inputs.routes_scope || 'full' }}
      SIGNALER_JOB_PRESET: ${{ inputs.job_preset || 'ci' }}
      SIGNALER_CLI_VERSION: ${{ inputs.cli_version || '4.2.0' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run Signaler
        uses: ./.github/actions/signaler
        with:
          cli-version: ${{ env.SIGNALER_CLI_VERSION }}
          base-url: ${{ env.SIGNALER_BASE_URL }}
          scope: ${{ env.SIGNALER_ROUTES_SCOPE }}
          preset: ${{ env.SIGNALER_JOB_PRESET }}
          config-path: ${{ env.SIGNALER_CONFIG_PATH }}
          managed-serve-mode: auto
